@if (open) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true"
  aria-labelledby="settings-modal-title">
  <div class="absolute inset-0 bg-slate-900/60 dark:bg-slate-950/70 backdrop-blur-sm" (click)="onClose()"></div>

  <div
    class="relative w-full max-w-sm flex flex-col rounded-xl bg-white dark:bg-slate-800 shadow-xl border border-slate-200 dark:border-slate-700">
    <div class="flex items-center justify-between p-4 border-b border-slate-200 dark:border-slate-700">
      <h2 id="settings-modal-title" class="text-lg font-semibold text-slate-800 dark:text-slate-200">Settings</h2>
      <button type="button"
        class="p-2 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors min-h-[2.75rem] min-w-[2.75rem] flex items-center justify-center"
        (click)="onClose()" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="p-4 flex flex-col gap-4">
      <div>
        <div class="text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2">Theme</div>
        <div class="flex flex-wrap gap-2">
          <button type="button" class="secondary-btn btn-sm"
            [class.active]="themeService.currentThemeType === THEME_TYPE.AUTO" (click)="onThemePick(THEME_TYPE.AUTO)">
            Auto
          </button>
          <button type="button" class="secondary-btn btn-sm"
            [class.active]="themeService.currentThemeType === THEME_TYPE.DARK" (click)="onThemePick(THEME_TYPE.DARK)">
            Dark
          </button>
          <button type="button" class="secondary-btn btn-sm"
            [class.active]="themeService.currentThemeType === THEME_TYPE.LIGHT" (click)="onThemePick(THEME_TYPE.LIGHT)">
            Light
          </button>
        </div>
      </div>

      <div>
        <div class="text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2">Border settings</div>
        <div class="flex flex-col gap-2">
          <label *ngFor="let item of borderItems" class="flex items-center gap-3 select-none">
            <input type="checkbox" class="h-4 w-4 accent-blue-600" [checked]="item.checked"
              (change)="onBorderChange(item, ($any($event.target).checked))" />
            <span class="text-sm text-slate-700 dark:text-slate-200">{{ item.label }}</span>
          </label>
        </div>
      </div>
    </div>
  </div>
</div>
}
