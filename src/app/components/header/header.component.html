<header
  class="border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md sticky top-0 z-30">
  <div class="flex items-center gap-2 h-14 px-4 lg:px-8">
    <!-- Mobile hamburger -->
    <button type="button"
      class="header-icon-btn md:hidden shrink-0 p-2 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-700 dark:hover:text-slate-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-slate-900 transition-colors flex items-center justify-center min-h-[2.75rem] min-w-[2.75rem]"
      (click)="toggleMobileMenu()" [attr.aria-expanded]="mobileMenuOpen" aria-controls="mobile-nav-drawer"
      [attr.aria-label]="mobileMenuOpen ? 'Close menu' : 'Open menu'">
      <svg *ngIf="!mobileMenuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
        stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
      <svg *ngIf="mobileMenuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
        stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Brand -->
    <a routerLink="/home"
      class="flex items-center gap-2.5 shrink-0 rounded-lg focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-slate-900 no-underline text-inherit hover:opacity-90 transition-opacity"
      [attr.aria-label]="appTitle + ' home'">
      <img [src]="logoSrc" alt="" width="32" height="32" class="h-8 w-8 rounded-lg object-contain shrink-0" />
      <span
        class="text-base font-semibold tracking-tight text-slate-900 dark:text-slate-100 whitespace-nowrap hidden sm:inline">{{
        appTitle }}</span>
    </a>

    <!-- Desktop primary nav -->
    <nav class="hidden md:flex items-center gap-0.5 ml-4" aria-label="Main">
      <a *ngFor="let nav of primaryLinks" [routerLink]="nav.path" routerLinkActive="header-nav-active"
        [routerLinkActiveOptions]="{ exact: isExactHome(nav.path) }"
        class="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-slate-900 transition-colors no-underline">
        {{ nav.label }}
      </a>

      <!-- More dropdown -->
      <div class="header-more relative">
        <button type="button"
          class="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-slate-900 transition-colors cursor-pointer border-0 bg-transparent"
          [class.header-nav-active]="moreMenuOpen || isMoreRouteActive"
          (click)="toggleMoreMenu(); $event.stopPropagation()" [attr.aria-expanded]="moreMenuOpen" aria-haspopup="true"
          aria-controls="header-more-menu">
          More
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 transition-transform"
            [class.rotate-180]="moreMenuOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
            aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        @if (moreMenuOpen) {
        <div id="header-more-menu"
          class="absolute top-full left-0 mt-1.5 min-w-[12rem] py-1.5 z-50 rounded-xl bg-white dark:bg-slate-800 shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden"
          role="menu" aria-label="More pages">
          <a *ngFor="let nav of moreLinks" [routerLink]="nav.path" routerLinkActive="header-more-active" role="menuitem"
            class="block px-4 py-2.5 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 focus-visible:outline-none focus-visible:bg-slate-100 dark:focus-visible:bg-slate-700 no-underline transition-colors"
            (click)="closeMoreMenu()">
            {{ nav.label }}
          </a>
        </div>
        }
      </div>
    </nav>

    <div class="flex-1"></div>

    <!-- Actions -->
    <div class="flex items-center gap-0.5 shrink-0">
      <button type="button"
        class="p-2 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-700 dark:hover:text-slate-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-slate-900 transition-colors flex items-center justify-center shrink-0 min-h-[2.75rem] min-w-[2.75rem] disabled:opacity-50 disabled:cursor-not-allowed"
        (click)="onRefresh()" [disabled]="appService.isLoading" title="Refresh" aria-label="Refresh data">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" [class.animate-spin]="appService.isLoading" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
      </button>

      <span class="hidden sm:block w-px h-5 mx-1 bg-slate-200 dark:bg-slate-700" aria-hidden="true"></span>

      <button type="button"
        class="p-2 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-700 dark:hover:text-slate-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-slate-900 transition-colors flex items-center justify-center shrink-0 min-h-[2.75rem] min-w-[2.75rem]"
        (click)="openSettingsModal()" aria-label="Open settings">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- Mobile nav drawer -->
@if (mobileMenuOpen) {
<div class="fixed inset-0 z-50 md:hidden" role="dialog" aria-modal="true" aria-label="Navigation menu">
  <div class="absolute inset-0 bg-slate-900/50 dark:bg-slate-950/60 backdrop-blur-sm" (click)="closeMobileMenu()"></div>
  <aside id="mobile-nav-drawer"
    class="header-drawer absolute top-0 left-0 bottom-0 bg-white dark:bg-slate-900 shadow-2xl border-r border-slate-200 dark:border-slate-800 flex flex-col overflow-y-auto"
    [attr.aria-expanded]="mobileMenuOpen">
    <div class="flex items-center gap-2.5 px-4 h-14 shrink-0 border-b border-slate-200 dark:border-slate-800">
      <img [src]="logoSrc" alt="" width="32" height="32" class="h-8 w-8 rounded-lg object-contain shrink-0" />
      <span class="text-base font-semibold tracking-tight text-slate-900 dark:text-slate-100">{{ appTitle }}</span>
    </div>

    <nav class="flex flex-col py-3 px-2" aria-label="Main">
      <p class="px-3 pt-1 pb-1.5 text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Main
      </p>
      <a *ngFor="let nav of primaryLinks" [routerLink]="nav.path" routerLinkActive="header-drawer-active"
        [routerLinkActiveOptions]="{ exact: isExactHome(nav.path) }"
        class="block px-3 py-2.5 rounded-lg text-sm font-medium text-slate-800 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 min-h-[2.75rem] flex items-center no-underline transition-colors"
        (click)="closeMobileMenu()">
        {{ nav.label }}
      </a>

      <p class="px-3 pt-3 pb-1.5 text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">More
      </p>
      <a *ngFor="let nav of moreLinks" [routerLink]="nav.path" routerLinkActive="header-drawer-active"
        class="block px-3 py-2.5 rounded-lg text-sm font-medium text-slate-800 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-400 min-h-[2.75rem] flex items-center no-underline transition-colors"
        (click)="closeMobileMenu()">
        {{ nav.label }}
      </a>
    </nav>
  </aside>
</div>
}

<app-settings [open]="showSettingsModal" (close)="closeSettingsModal()"></app-settings>
