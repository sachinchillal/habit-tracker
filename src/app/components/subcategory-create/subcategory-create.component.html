<form (ngSubmit)="onSubmit()">
  <div class="flex flex-col gap-2 p-4 border dark:border-gray-700 rounded shadow">

    <label class="text-sm font-medium text-gray-700 dark:text-gray-200" for="subcategory-category">
      Parent category
    </label>
    <select id="subcategory-category" [(ngModel)]="subcategory.categoryId" name="categoryId" required
      [disabled]="!parentOptions.length"
      class="border p-2 rounded dark:bg-gray-800 dark:border-gray-600 dark:text-white disabled:opacity-50">
      <option value="undefined" selected disabled>Select parent category</option>
      <option *ngFor="let category of parentOptions" [value]="category.id">{{ parentLabel(category) }}</option>
    </select>
    <p *ngIf="!parentOptions.length" class="text-xs text-amber-600 dark:text-amber-400">
      No categories yet. Create a category first.
    </p>

    <input type="text" placeholder="Title" [(ngModel)]="subcategory.title" name="title"
      class="border p-2 rounded dark:bg-gray-800 dark:border-gray-600 dark:text-white" />
    <textarea class="border p-2 rounded resize-none min-h-[80px] dark:bg-gray-800 dark:border-gray-600 dark:text-white"
      placeholder="Description" [(ngModel)]="subcategory.description" name="description"></textarea>

    <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 disabled:opacity-50" type="submit"
      [disabled]="!isValid">
      {{ subcategory.id ? 'Update Subcategory' : 'Create Subcategory' }}
    </button>
    <ng-container *ngIf="subcategory.id">
      <button title="Cancel Edit" type="reset" (click)="resetForm()"
        class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-red-900">Cancel Edit
      </button>
    </ng-container>
  </div>
</form>
