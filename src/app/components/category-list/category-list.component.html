<div class="flex flex-col h-full">
  <div class="flex items-center mb-4 shrink-0">
    <h2 class="text-xl font-bold">Categories
      <span class="text-xs text-gray-500 ml-2">({{appService.categories.length}})</span>
    </h2>
  </div>
  <ul class="space-y-2 overflow-y-auto scrollbar flex-1 min-h-0">
    <li *ngFor="let c of appService.categories; let index=index; trackBy: trackCategoryById"
      class="relative rounded shadow p-2 border border-gray-200 dark:border-gray-700"
      [style.margin-left.rem]="appService.getCategoryDepth(c) * 0.75">
      <div class="flex items-start justify-between gap-2 mb-1">
        <div class="font-medium text-slate-800 dark:text-slate-100">{{ c.title }}</div>
        <span *ngIf="appService.getCategoryParentPath(c) as parentPath"
          class="shrink-0 max-w-[55%] truncate text-[11px] font-medium px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300"
          [title]="parentPath">
          {{ parentPath }}
        </span>
      </div>
      <p *ngIf="c.description?.trim()" class="mb-2 text-sm text-slate-500 dark:text-slate-400 line-clamp-2"
        [title]="c.description">
        {{ c.description }}
      </p>
      <div class="flex gap-2 items-center">
        <div class="text-xs text-gray-500">{{c.id | date:'medium'}}</div>
        <i class="ms-auto"></i>
        <button title="Add child category" aria-label="Add child category" (click)="handleAddChild(c)"
          class="p-1 px-2 hover:bg-emerald-900 rounded text-sm font-medium text-emerald-700 dark:text-emerald-300">
          +
        </button>
        <button title="Delete category" aria-label="Delete category" (click)="handleDelete(c)"
          class="p-1 hover:bg-red-900 rounded">
          &#128465;
        </button>
        <button title="Edit category" aria-label="Edit category" (click)="handleEdit(c)"
          class="p-1 hover:bg-blue-900 rounded">
          &#9999;
        </button>
      </div>
    </li>
    <li *ngIf="!appService.categories.length" class="text-sm text-gray-500 dark:text-gray-400 italic p-2">
      No categories yet. Create a category to get started.
    </li>
  </ul>
</div>
